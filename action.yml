name: "VibeGuard Security Scan"
description: "Scan AI-generated code risks: hallucinated packages, hardcoded secrets, unsafe config, lightweight SAST findings, and optional semantic gaps."
author: "VibeGuard"
inputs:
  path:
    description: "Path to scan inside the checked-out repository."
    required: false
    default: "."
  fail_on:
    description: "Minimum severity that fails the action: critical, high, medium, low, info, or none."
    required: false
    default: "critical"
  package_verification:
    description: "Package verification mode: seed, remote, or off."
    required: false
    default: "seed"
  mode:
    description: "Scan mode: full-scan or ai-code-scan. AI mode reports only findings overlapping changed, AI-attributed lines."
    required: false
    default: "full-scan"
  ai_detection:
    description: "AI code detection strategy: author uses git blame attribution, message uses blamed commit messages, aggressive also includes large additions."
    required: false
    default: "author"
  base_ref:
    description: "Optional base git ref/SHA for ai-code-scan."
    required: false
    default: ""
  head_ref:
    description: "Optional head git ref/SHA for ai-code-scan."
    required: false
    default: ""
  l2:
    description: "Enable lightweight L2 SAST rules."
    required: false
    default: "true"
  l3:
    description: "Enable L3 semantic endpoint checks. Uses an LLM provider when credentials are available, otherwise falls back to local heuristics."
    required: false
    default: "false"
  llm_provider:
    description: "LLM provider for L3: deepseek, claude, openai, local, or vibeguard (official Pro service)."
    required: false
    default: ""
  llm_model:
    description: "Optional model override for L3 semantic analysis."
    required: false
    default: ""
  llm_base_url:
    description: "Optional provider base URL override for L3 semantic analysis."
    required: false
    default: ""
  llm_api_key_env:
    description: "Optional environment variable name that contains the L3 provider API key."
    required: false
    default: ""
  github_annotations:
    description: "Emit GitHub workflow annotations for active findings."
    required: false
    default: "true"
  sarif:
    description: "Optional path for a SARIF report file."
    required: false
    default: ""
  markdown:
    description: "Optional path for a Markdown report file."
    required: false
    default: ""
  step_summary:
    description: "Append the Markdown report to the GitHub Actions job summary."
    required: false
    default: "true"
  pr_comment:
    description: "Create or update a sticky VibeGuard pull request comment with the Markdown report."
    required: false
    default: "false"
  pr_review_comments:
    description: "Create de-duplicated inline GitHub Review comments for active findings on pull request diff lines."
    required: false
    default: "false"
  pr_review_comment_limit:
    description: "Maximum inline review comments to create per run, from 1 to 50."
    required: false
    default: "20"
  dashboard:
    description: "Write a standalone HTML findings dashboard after the scan. Requires store_findings true or an existing findings_db."
    required: false
    default: "false"
  dashboard_path:
    description: "Path for the generated HTML findings dashboard when dashboard is true."
    required: false
    default: ""
  dashboard_days:
    description: "Number of recent days to include in the generated findings dashboard."
    required: false
    default: "30"
  dashboard_top:
    description: "Number of top detection rules to show in the generated findings dashboard."
    required: false
    default: "10"
  compliance:
    description: "Write a Markdown SOC 2 / ISO 27001 security evidence report after the scan. Requires store_findings true or an existing findings_db."
    required: false
    default: "false"
  compliance_path:
    description: "Path for the generated compliance evidence report when compliance is true."
    required: false
    default: ""
  compliance_framework:
    description: "Compliance framework evidence to include: soc2, iso27001, or all."
    required: false
    default: "all"
  compliance_days:
    description: "Number of recent days to include in the compliance evidence report."
    required: false
    default: "90"
  ignore_rules:
    description: "Optional path to ignore-rules.yml."
    required: false
    default: ""
  custom_rules:
    description: "Optional path to custom VibeGuard YAML rules."
    required: false
    default: ""
  config:
    description: "Optional path to VibeGuard config.json. Action inputs override config defaults."
    required: false
    default: ""
  no_config:
    description: "Disable config.json loading."
    required: false
    default: "false"
  dedup_existing_tools:
    description: "Dismiss duplicate L2 findings when nearby SonarQube, Snyk, Semgrep, or CodeQL annotations already cover the issue. Use true, false, or leave empty for config defaults."
    required: false
    default: ""
  store_findings:
    description: "Persist scan runs and findings to a local SQLite findings database."
    required: false
    default: "false"
  findings_db:
    description: "Optional path to findings.db when store_findings is true."
    required: false
    default: ""
  findings_project:
    description: "Stable project identifier for stored or centrally uploaded findings. Defaults to GITHUB_REPOSITORY when available."
    required: false
    default: ""
  findings_endpoint:
    description: "Optional private dashboard POST /api/ingest endpoint for centralized CI findings."
    required: false
    default: ""
  findings_token_env:
    description: "Environment variable name containing the dedicated private-dashboard ingest token."
    required: false
    default: "VIBEGUARD_FINDINGS_INGEST_TOKEN"
  findings_upload_required:
    description: "Fail the scan when a configured private-dashboard findings upload fails."
    required: false
    default: "false"
  no_ignore:
    description: "Disable ignore-rules.yml processing."
    required: false
    default: "false"
  package_index:
    description: "Optional path to package-index.json."
    required: false
    default: ""
  storage:
    description: "Package storage mode: auto, json, or sqlite."
    required: false
    default: "auto"
  sqlite_db:
    description: "Optional path to packages.db when storage is sqlite."
    required: false
    default: ""
outputs:
  dashboard_path:
    description: "Path to the generated HTML findings dashboard when dashboard is true."
    value: ${{ steps.vibeguard.outputs.dashboard_path }}
  compliance_path:
    description: "Path to the generated Markdown compliance evidence report when compliance is true."
    value: ${{ steps.vibeguard.outputs.compliance_path }}
runs:
  using: "composite"
  steps:
    - name: Install VibeGuard dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci
    - name: Build VibeGuard
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build
    - name: Run VibeGuard scan
      id: vibeguard
      shell: bash
      run: |
        set -euo pipefail
        extra_args=()
        markdown_report="${{ inputs.markdown }}"
        if [ -z "$markdown_report" ]; then
          markdown_report="${RUNNER_TEMP:-.}/vibeguard-report.md"
        fi
        if [ "${{ inputs.mode }}" != "full-scan" ]; then
          extra_args+=("--mode" "${{ inputs.mode }}")
        fi
        extra_args+=("--ai-detection" "${{ inputs.ai_detection }}")
        base_ref="${{ inputs.base_ref }}"
        head_ref="${{ inputs.head_ref }}"
        if [ -z "$base_ref" ]; then
          base_ref="${{ github.event.pull_request.base.sha }}"
        fi
        if [ -z "$head_ref" ]; then
          head_ref="${{ github.event.pull_request.head.sha }}"
        fi
        if [ -n "$base_ref" ]; then
          extra_args+=("--base-ref" "$base_ref")
        fi
        if [ -n "$head_ref" ]; then
          extra_args+=("--head-ref" "$head_ref")
        fi
        if [ "${{ inputs.l2 }}" != "true" ]; then
          extra_args+=("--no-l2")
        fi
        if [ "${{ inputs.l3 }}" = "true" ]; then
          extra_args+=("--l3")
        fi
        if [ -n "${{ inputs.llm_provider }}" ]; then
          extra_args+=("--llm-provider" "${{ inputs.llm_provider }}")
        fi
        if [ -n "${{ inputs.llm_model }}" ]; then
          extra_args+=("--llm-model" "${{ inputs.llm_model }}")
        fi
        if [ -n "${{ inputs.llm_base_url }}" ]; then
          extra_args+=("--llm-base-url" "${{ inputs.llm_base_url }}")
        fi
        if [ -n "${{ inputs.llm_api_key_env }}" ]; then
          extra_args+=("--llm-api-key-env" "${{ inputs.llm_api_key_env }}")
        fi
        if [ "${{ inputs.github_annotations }}" = "true" ]; then
          extra_args+=("--github-annotations")
        fi
        if [ -n "${{ inputs.sarif }}" ]; then
          extra_args+=("--sarif" "${{ inputs.sarif }}")
        fi
        extra_args+=("--markdown" "$markdown_report")
        if [ "${{ inputs.no_ignore }}" = "true" ]; then
          extra_args+=("--no-ignore")
        fi
        if [ -n "${{ inputs.ignore_rules }}" ]; then
          extra_args+=("--ignore-rules" "${{ inputs.ignore_rules }}")
        fi
        if [ -n "${{ inputs.custom_rules }}" ]; then
          extra_args+=("--custom-rules" "${{ inputs.custom_rules }}")
        fi
        if [ -n "${{ inputs.config }}" ]; then
          extra_args+=("--config" "${{ inputs.config }}")
        fi
        if [ "${{ inputs.no_config }}" = "true" ]; then
          extra_args+=("--no-config")
        fi
        if [ "${{ inputs.dedup_existing_tools }}" = "true" ]; then
          extra_args+=("--dedup-existing-tools")
        fi
        if [ "${{ inputs.dedup_existing_tools }}" = "false" ]; then
          extra_args+=("--no-dedup-existing-tools")
        fi
        if [ "${{ inputs.store_findings }}" != "true" ]; then
          extra_args+=("--no-store-findings")
        fi
        if [ -n "${{ inputs.findings_db }}" ]; then
          extra_args+=("--findings-db" "${{ inputs.findings_db }}")
        fi
        findings_project="${{ inputs.findings_project }}"
        if [ -z "$findings_project" ]; then
          findings_project="${GITHUB_REPOSITORY:-${{ github.repository }}}"
        fi
        if [ -n "$findings_project" ]; then
          extra_args+=("--findings-project" "$findings_project")
        fi
        if [ -n "${{ inputs.findings_endpoint }}" ]; then
          extra_args+=("--findings-endpoint" "${{ inputs.findings_endpoint }}" "--findings-token-env" "${{ inputs.findings_token_env }}")
          if [ "${{ inputs.findings_upload_required }}" = "true" ]; then
            extra_args+=("--findings-upload-required")
          fi
        fi
        if [ -n "${{ inputs.package_index }}" ]; then
          extra_args+=("--package-index" "${{ inputs.package_index }}")
        fi
        extra_args+=("--storage" "${{ inputs.storage }}")
        if [ -n "${{ inputs.sqlite_db }}" ]; then
          extra_args+=("--sqlite-db" "${{ inputs.sqlite_db }}")
        fi
        review_findings=""
        if [ "${{ inputs.pr_review_comments }}" = "true" ]; then
          review_findings="${RUNNER_TEMP:-.}/vibeguard-pr-review-findings.json"
          extra_args+=("--json" "--output" "$review_findings")
        fi
        set +e
        node "${{ github.action_path }}/dist/cli.js" scan "${{ inputs.path }}" \
          --fail-on "${{ inputs.fail_on }}" \
          --package-verification "${{ inputs.package_verification }}" \
          "${extra_args[@]}"
        scan_status=$?
        set -e

        if [ "${{ inputs.dashboard }}" = "true" ]; then
          dashboard_report="${{ inputs.dashboard_path }}"
          if [ -z "$dashboard_report" ]; then
            dashboard_report="vibeguard-dashboard.html"
          fi
          if [ "${{ inputs.store_findings }}" = "true" ] || [ -n "${{ inputs.findings_db }}" ]; then
            dashboard_args=("--output" "$dashboard_report" "--days" "${{ inputs.dashboard_days }}" "--top" "${{ inputs.dashboard_top }}")
            if [ -n "${{ inputs.findings_db }}" ]; then
              dashboard_args+=("--db" "${{ inputs.findings_db }}")
            fi
            node "${{ github.action_path }}/dist/cli.js" findings dashboard "${dashboard_args[@]}"
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "dashboard_path=$dashboard_report" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "VibeGuard warning: dashboard requested but store_findings is false and no findings_db was provided." >&2
          fi
        fi

        if [ "${{ inputs.compliance }}" = "true" ]; then
          compliance_report="${{ inputs.compliance_path }}"
          if [ -z "$compliance_report" ]; then
            compliance_report="vibeguard-compliance-report.md"
          fi
          if [ "${{ inputs.store_findings }}" = "true" ] || [ -n "${{ inputs.findings_db }}" ]; then
            compliance_args=("--output" "$compliance_report" "--days" "${{ inputs.compliance_days }}" "--framework" "${{ inputs.compliance_framework }}")
            if [ -n "${{ inputs.findings_db }}" ]; then
              compliance_args+=("--db" "${{ inputs.findings_db }}")
            fi
            node "${{ github.action_path }}/dist/cli.js" findings compliance "${compliance_args[@]}"
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "compliance_path=$compliance_report" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "VibeGuard warning: compliance report requested but store_findings is false and no findings_db was provided." >&2
          fi
        fi

        if [ "${{ inputs.step_summary }}" = "true" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "$markdown_report" ]; then
          cat "$markdown_report" >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "${{ inputs.pr_comment }}" = "true" ] && [ -f "$markdown_report" ]; then
          pr_number="${{ github.event.pull_request.number }}"
          repo="${GITHUB_REPOSITORY:-${{ github.repository }}}"
          token="${GITHUB_TOKEN:-${{ github.token }}}"
          if [ -n "$pr_number" ] && [ -n "$repo" ] && [ -n "$token" ]; then
            marker="<!-- vibeguard-pr-comment -->"
            comment_payload="${RUNNER_TEMP:-.}/vibeguard-comment.json"
            node -e 'const fs = require("fs"); const [markdownPath, payloadPath, marker] = process.argv.slice(1); const markdown = fs.readFileSync(markdownPath, "utf8"); fs.writeFileSync(payloadPath, JSON.stringify({ body: `${marker}\n${markdown}` }));' "$markdown_report" "$comment_payload" "$marker"
            comments_file="${RUNNER_TEMP:-.}/vibeguard-comments.json"
            if curl -fsSL \
              -H "Authorization: Bearer $token" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/issues/$pr_number/comments?per_page=100" \
              -o "$comments_file"; then
              comment_id="$(node -e 'const fs = require("fs"); const [commentsPath, marker] = process.argv.slice(1); const comments = JSON.parse(fs.readFileSync(commentsPath, "utf8")); const match = Array.isArray(comments) ? comments.find((comment) => String(comment.body || "").includes(marker)) : undefined; process.stdout.write(match ? String(match.id) : "");' "$comments_file" "$marker")"
              if [ -n "$comment_id" ]; then
                curl -fsSL -X PATCH \
                  -H "Authorization: Bearer $token" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/$repo/issues/comments/$comment_id" \
                  --data-binary "@$comment_payload" >/dev/null || echo "VibeGuard warning: failed to update PR comment." >&2
              else
                curl -fsSL -X POST \
                  -H "Authorization: Bearer $token" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/$repo/issues/$pr_number/comments" \
                  --data-binary "@$comment_payload" >/dev/null || echo "VibeGuard warning: failed to create PR comment." >&2
              fi
            else
              echo "VibeGuard warning: failed to list PR comments." >&2
            fi
          else
            echo "VibeGuard warning: PR comment requested outside a pull_request event or without a token." >&2
          fi
        fi

        if [ "${{ inputs.pr_review_comments }}" = "true" ] && [ -n "$review_findings" ] && [ -f "$review_findings" ]; then
          pr_number="${{ github.event.pull_request.number }}"
          repo="${GITHUB_REPOSITORY:-${{ github.repository }}}"
          token="${GITHUB_TOKEN:-${{ github.token }}}"
          api_url="${GITHUB_API_URL:-https://api.github.com}"
          review_commit="${{ github.event.pull_request.head.sha }}"
          if [ -z "$review_commit" ]; then
            review_commit="$head_ref"
          fi
          if [ -n "$pr_number" ] && [ -n "$repo" ] && [ -n "$token" ] && [ -n "$review_commit" ]; then
            changed_files="${RUNNER_TEMP:-.}/vibeguard-pr-files.json"
            existing_review_comments="${RUNNER_TEMP:-.}/vibeguard-pr-review-comments.json"
            review_payload="${RUNNER_TEMP:-.}/vibeguard-pr-review.json"
            if curl -fsSL \
              -H "Authorization: Bearer $token" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api_url/repos/$repo/pulls/$pr_number/files?per_page=100" \
              -o "$changed_files" && \
              curl -fsSL \
                -H "Authorization: Bearer $token" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$api_url/repos/$repo/pulls/$pr_number/comments?per_page=100" \
                -o "$existing_review_comments"; then
              review_count=""
              if review_count="$(node "${{ github.action_path }}/scripts/create-pr-review-payload.cjs" "$review_findings" "$changed_files" "$existing_review_comments" "$review_commit" "${{ inputs.pr_review_comment_limit }}" "$review_payload")" && [[ "$review_count" =~ ^[0-9]+$ ]]; then
                if [ "$review_count" -gt 0 ]; then
                  curl -fsSL -X POST \
                    -H "Authorization: Bearer $token" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "$api_url/repos/$repo/pulls/$pr_number/reviews" \
                    --data-binary "@$review_payload" >/dev/null || echo "VibeGuard warning: failed to create inline PR review comments." >&2
                fi
              else
                echo "VibeGuard warning: failed to prepare inline PR review comments." >&2
              fi
            else
              echo "VibeGuard warning: failed to inspect PR files or existing review comments; skipping inline comments to avoid duplicates." >&2
            fi
          else
            echo "VibeGuard warning: inline PR comments requested outside a pull_request event or without a writable token." >&2
          fi
        fi

        exit "$scan_status"
