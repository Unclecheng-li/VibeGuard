name: Marketplace Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vibeguard-marketplace-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const version = require("./package.json").version;
          const gradle = fs.readFileSync("jetbrains/build.gradle.kts", "utf8");
          const match = gradle.match(/^version\s*=\s*"([^"]+)"/m);
          if (!match || match[1] !== version) {
            throw new Error(`Version mismatch: package.json=${version}, JetBrains=${match?.[1] ?? "missing"}`);
          }
          const tag = process.env.GITHUB_REF_NAME;
          if (process.env.GITHUB_EVENT_NAME === "push" && tag !== `v${version}`) {
            throw new Error(`Release tag must be v${version}; received ${tag}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          NODE

  vscode:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm exec -- vsce package --out "vibeguard-${{ needs.verify-version.outputs.version }}.vsix"
      - uses: actions/upload-artifact@v5
        with:
          name: vibeguard-vscode-${{ needs.verify-version.outputs.version }}
          path: vibeguard-${{ needs.verify-version.outputs.version }}.vsix
      - name: Check VSCode publishing credentials
        id: publishing
        if: github.event_name == 'push'
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VSCE_PAT is not configured; the VSIX artifact was built but Marketplace publication was skipped."
          fi
      - name: Publish VSCode extension
        if: github.event_name == 'push' && steps.publishing.outputs.available == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm exec -- vsce publish --packagePath "vibeguard-${{ needs.verify-version.outputs.version }}.vsix"

  jetbrains:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
      - run: chmod +x ./gradlew
        working-directory: jetbrains
      - run: ./gradlew buildPlugin --no-daemon
        working-directory: jetbrains
      - uses: actions/upload-artifact@v5
        with:
          name: vibeguard-jetbrains-${{ needs.verify-version.outputs.version }}
          path: jetbrains/build/distributions/*.zip
      - name: Check JetBrains publishing credentials
        id: publishing
        if: github.event_name == 'push'
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [ -n "$JETBRAINS_MARKETPLACE_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::JETBRAINS_MARKETPLACE_TOKEN is not configured; the ZIP artifact was built but Marketplace publication was skipped."
          fi
      - name: Publish JetBrains plugin
        if: github.event_name == 'push' && steps.publishing.outputs.available == 'true'
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin --no-daemon
        working-directory: jetbrains
